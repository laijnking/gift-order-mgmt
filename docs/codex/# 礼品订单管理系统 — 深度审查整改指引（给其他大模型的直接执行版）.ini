## 1. 整改原则（严格遵守）

1. 一次只做一个关注点（单个 PR 不超过 2 个关注点）。
2. 不做无关重构；优先补丁式修复。
3. 每一步都要有“可执行验证命令 + 实际输出结论”。
4. 涉及功能/字段/API变化，必须同步更新 `docs/Product/` 文档并加版本记录。
5. 不要 `git push --force`；不要做破坏性 SQL。

