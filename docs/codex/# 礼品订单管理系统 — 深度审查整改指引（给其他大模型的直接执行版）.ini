## 2. 推荐拆分为 4 个整改批次（建议按顺序）

## 批次 A（P0）：修复当前门禁失败

### 目标
让 `pnpm check:unattended-acceptance` 首先可通过，恢复基础交付能力。

### 操作
1. 定位 `src/app/(app)/templates/page.tsx` 中 `any` 的来源。
2. 用明确类型替换 `any`（可用 `unknown + narrowing` 或定义接口）。
3. 不改业务逻辑，仅修类型。

### 验证命令
- `pnpm check:layout-acceptance`
- `pnpm check:unattended-acceptance`

### 完成标准
两个命令均通过。

---

## 批次 B（P0）：权限边界加固

### 目标
禁止仅凭客户端可控 header 作为授权依据。

### 推荐实现路径（最小可落地）
1. 新增服务端会话签名方案（示例：`x-user-info` + `x-user-signature` + 时间戳 + HMAC）。
2. 在 `server-auth` 中做签名校验与过期校验，校验失败返回 401。
3. 前端仅在受控流程生成签名；禁止直接信任 localStorage 的 permission 做后端授权。
4. 保留向后兼容开关（如 `AUTH_LEGACY_HEADER_MODE=true`），默认关闭，便于灰度。

> 更优方案是迁移到 HttpOnly Cookie Session / JWT，但如改动面过大，可先做 HMAC 过渡。

### 涉及文件（示例）
- `src/lib/server-auth.ts`
- `src/lib/auth.tsx`
- `src/app/api/**/route.ts`（复用统一鉴权函数，尽量不逐路由散改）

### 验证命令
- `pnpm check:permissions`
- `pnpm check:api-contracts`
- `pnpm check:business-smoke`

### 完成标准
权限回归通过，且无新增 401/403 误伤。

---

## 批次 C（P0）：密码安全整改

### 目标
消除明文密码与弱校验路径。

### 必做项
1. 引入 `argon2id`（优先）或 `bcrypt`。
2. 登录只允许“安全哈希校验”路径，删除明文直比与内置弱默认密码后门。
3. 改密接口写入哈希值，绝不写明文。
4. 增加迁移兼容：
   - 旧数据若是 SHA256，可在首次登录成功后自动升级为新哈希。
   - 明文存量账号需强制改密或批量迁移脚本。
5. 为登录/改密补测试（成功、失败、锁定策略如有）。

### 验证命令
- `pnpm check:api-contracts`
- `pnpm check:unattended-acceptance`

### 完成标准
旧用户可平滑过渡；新密码全为强哈希。

---

## 批次 D（P1）：SSRF 风险收敛（`/api/fetch-url`）

### 目标
限制服务端代请求能力，避免探测内网/云元数据。

### 必做项
1. 仅允许 `http/https`。
2. 拒绝私网/回环/链路本地/metadata 目标（如 `127.0.0.1`、`169.254.169.254`、`10/8`、`172.16/12`、`192.168/16`、`::1` 等）。
3. 可选：增加域名白名单（配置化）。
4. 限制超时、重定向次数、响应体大小。
5. 错误信息脱敏（不要回传内部网络细节）。

### 验证命令
- `pnpm check:api-contracts`
- 自增 `fetch-url` 安全用例（若仓库有相关脚本则接入）
- `pnpm check:unattended-acceptance`

